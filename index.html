<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30초만</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.png" type="image/png">
  <meta name="theme-color" content="#121212">
</head>
<body>

  <!-- 스플래시 화면 -->
  <div id="splash-screen">
    <img src="logo.png" alt="30초만 로고" class="splash-logo">
    <h1>30초만</h1>
    <p>딱 30초만 기다려봐</p>
  </div>

  <!-- 상단 헤더 & PWA 설치 버튼 -->
  <header class="top-header">
    <div class="brand">
      <img src="logo.png" alt="로고" class="header-logo">
      <span>30초만</span>
    </div>
    <button id="install-btn" class="install-btn hidden">앱 설치하기</button>
  </header>

  <!-- 메인 컨테이너 -->
  <main class="container">
    <div class="hero">
      <img src="logo.png" alt="로고" class="main-logo">
      <h2>30초만</h2>
      <p class="subtitle">유튜브, 문서, 이미지, 텍스트 무엇이든 30초 요약</p>
    </div>

    <!-- 모드 선택 탭 -->
    <div class="tab-group">
      <button class="tab-btn active" data-mode="youtube">유튜브 링크</button>
      <button class="tab-btn" data-mode="file">파일 (PDF/이미지)</button>
      <button class="tab-btn" data-mode="text">텍스트 직접 입력</button>
    </div>

    <!-- 입력 폼 구역 -->
    <div class="input-card">
      <!-- 1. 유튜브 입력 영역 -->
      <div id="input-youtube" class="input-section">
        <input type="url" id="yt-input" placeholder="유튜브 영상 링크를 입력하세요 (https://...)" autocomplete="off">
      </div>

      <!-- 2. 파일 업로드 영역 -->
      <div id="input-file" class="input-section hidden">
        <label for="file-input" class="file-label">
          <span id="file-name-display">📄 PDF, PNG, JPG 파일을선택하세요</span>
        </label>
        <input type="file" id="file-input" accept="application/pdf, image/png, image/jpeg">
      </div>

      <!-- 3. 텍스트 입력 영역 -->
      <div id="input-text" class="input-section hidden">
        <textarea id="text-input" placeholder="요약할 글이나 기사, 메모를 직접 붙여넣으세요..." rows="5"></textarea>
      </div>

      <button id="analyze-btn" class="submit-btn">30초 만에 요약하기</button>
    </div>

    <!-- 로딩 스피너 -->
    <div id="loading" class="loading-box hidden">
      <div class="spinner"></div>
      <p>AI가 핵심 내용을 추출하는 중입니다...</p>
    </div>

    <!-- 요약 결과 상자 -->
    <div id="result-box" class="result-box hidden"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
