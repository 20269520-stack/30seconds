<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30초 핵심 요약기</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 기본 탭 UI 스타일 */
    .tab-menu { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn { flex: 1; padding: 10px; border: 1px solid #ccc; background: #f5f5f5; cursor: pointer; border-radius: 6px; }
    .tab-btn.active { background: #0070f3; color: white; border-color: #0070f3; font-weight: bold; }
    .tab-content { display: none; margin-bottom: 16px; }
    .tab-content.active { display: block; }
    textarea { width: 100%; height: 120px; padding: 8px; box-sizing: border-box; }
    .hidden { display: none !important; }
    .result-box { margin-top: 20px; padding: 16px; background: #f0f8ff; border-radius: 8px; white-space: pre-wrap; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px; margin: 40px auto; padding: 20px; font-family: sans-serif;">
    <h1>⚡ 30초 핵심 요약기</h1>
    
    <!-- 탭 메뉴 -->
    <div class="tab-menu">
      <button class="tab-btn active" data-tab="youtube">유튜브 링크</button>
      <button class="tab-btn" data-tab="file">파일 (PDF/이미지)</button>
      <button class="tab-btn" data-tab="text">텍스트 직접 입력</button>
    </div>

    <!-- 1. 유튜브 탭 -->
    <div id="tab-youtube" class="tab-content active">
      <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=..." style="width: 100%; padding: 10px; box-sizing: border-box;">
    </div>

    <!-- 2. 파일 탭 (PDF 및 이미지) -->
    <div id="tab-file" class="tab-content">
      <input type="file" id="file-input" accept=".pdf, image/png, image/jpeg, image/webp">
      <p style="font-size: 12px; color: #666; margin-top: 6px;">* PDF 문서나 PNG, JPG 이미지 파일을 올려주세요.</p>
    </div>

    <!-- 3. 텍스트 탭 -->
    <div id="tab-text" class="tab-content">
      <textarea id="text-input" placeholder="요약할 긴 글을 이곳에 붙여넣으세요..."></textarea>
    </div>

    <!-- 요약 실행 버튼 -->
    <button id="summarize-btn" style="width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer;">
      ⚡ 30초 만에 요약하기
    </button>

    <!-- 로딩 및 결과 창 -->
    <div id="loading" class="hidden" style="margin-top: 16px; text-align: center; color: #0070f3; font-weight: bold;">
      AI가 내용을 요약하는 중입니다... 잠시만 기다려 주세요! 🚀
    </div>
    <div id="result-box" class="result-box hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
